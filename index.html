<!DOCTYPE html>
<html lang="es">
<head>
    <script src="datos.js"></script>
    <meta charset="UTF-8">
    <title>Arcade - Dashboard</title>
    <style>
        :root { --neon: #00ffcc; --bg: #0d0d0d; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        header { padding: 20px; background: #1a1a1a; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; overflow: hidden; text-align: center; transition: 0.3s; }
        .card:hover { border-color: var(--neon); transform: scale(1.02); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .btn-instalar { background: var(--neon); border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; color: black; }
        .btn-logout { background: transparent; color: #ff4444; border: 1px solid #ff4444; padding: 8px 15px; cursor: pointer; border-radius: 5px; }
        .filtros { text-align: center; padding: 15px; background: #111; }
        .btn-f { background: transparent; color: var(--neon); border: 1px solid var(--neon); padding: 8px 15px; cursor: pointer; margin: 5px; border-radius: 4px; }
        .btn-f:hover { background: var(--neon); color: black; }
    /* Estilos para el Badge y los Planes */
.planes-section { text-align: center; margin: 40px 0; }

.gaymer-badge {
    display: inline-flex;
    align-items: center;
    background: linear-gradient(45deg, #00ffcc, #0077ff);
    padding: 15px 30px;
    border-radius: 50px;
    cursor: pointer;
    font-weight: bold;
    color: #000;
    transition: 0.4s;
    box-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
}

.gaymer-badge:hover { transform: scale(1.1); box-shadow: 0 0 30px #00ffcc; }

.badge-icon { width: 30px; margin-right: 15px; border-radius: 50%; }

.planes-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 30px;
    flex-wrap: wrap;
    transition: all 0.5s ease;
}

.plan-card {
    background: rgba(20, 20, 20, 0.95);
    border: 1px solid #444;
    padding: 25px;
    border-radius: 15px;
    width: 200px;
    transition: 0.3s;
    position: relative;
}

.plan-card:hover { 
    border-color: #00ffcc; 
    transform: translateY(-10px); 
    box-shadow: 0 10px 20px rgba(0, 255, 204, 0.2); 
}

.plan-card.destacado { border: 2px solid #00ffcc; transform: scale(1.05); }

.popular-tag {
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    background: #00ffcc;
    color: #000;
    font-size: 10px;
    padding: 2px 10px;
    border-radius: 10px;
    font-weight: bold;
}

.precio { font-size: 24px; color: #00ffcc; margin: 15px 0; }
.precio span { font-size: 12px; color: #aaa; }
.plan-card ul { list-style: none; padding: 0; font-size: 13px; color: #ccc; }
.btn-plan { 
    background: #00ffcc; 
    border: none; 
    padding: 10px 20px; 
    border-radius: 5px; 
    margin-top: 15px; 
    cursor: pointer; 
    font-weight: bold; 
}
.hidden { display: none; opacity: 0; }
    </style>
</head>
<body>
    <header>
        <h2 style="color: var(--neon); margin: 0;">ARCADE</h2>
        <div>
            <span id="user-name" style="margin-right: 15px; font-weight: bold;"></span>
            <button class="btn-logout" onclick="cerrarSesion()">CERRAR SESIÓN</button>
        </div>
    </header>
    <!-- Sección Hazte Gaymer -->
<section class="planes-section">
    <div class="gaymer-badge" onclick="togglePlanes()">
        <img src="/imagenes/image.png" alt="Icono Gaymer" class="badge-icon">
        <span>¡HAZTE GAYMER!</span>
    </div>

    <div id="contenedor-planes" class="planes-container hidden">
        <div class="plan-card">
            <h3>ESENCIAL</h3>
            <p class="precio">$20 <span>/mes</span></p>
            <ul>
                <li>Acceso a 5 juegos</li>
                <li>Soporte básico</li>
            </ul>
            <button class="btn-plan">Elegir</button>
        </div>
        <div class="plan-card destacado">
            <div class="popular-tag">MÁS POPULAR</div>
            <h3>PRO</h3>
            <p class="precio">$100 <span>/mes</span></p>
            <ul>
                <li>Acceso a 20 juegos</li>
                <li>Sin anuncios</li>
                <li>Soporte 24/7</li>
            </ul>
            <button class="btn-plan">Elegir</button>
        </div>
        <div class="plan-card">
            <h3>GAYMER</h3>
            <p class="precio">$150 <span>/mes</span></p>
            <ul>
                <li>Acceso TOTAL</li>
                <li>Nuevos lanzamientos</li>
                <li>Acceso a ROMs retro</li>
            </ul>
            <button class="btn-plan">Elegir</button>
        </div>
    </div>
</section>
    <div class="filtros">
        <button class="btn-f" onclick="filtrar('todos')">TODOS</button>
        <button class="btn-f" onclick="filtrar('psx')">PSX</button>
        <button class="btn-f" onclick="filtrar('fbneo')">ARCADE</button>
        <button class="btn-f" onclick="filtrar('n64')">N64</button>
        <button class="btn-f" onclick="filtrar('gamecube')">GAMECUBE</button>
        <button class="btn-f" onclick="filtrar('xbox')">XBOX</button>
    </div>

    <div id="grid" class="grid"></div>

    <script>
        window.onload = () => {
            const user = localStorage.getItem('usuario'); 
            if (!user) {
                window.location.href = 'login.html';
            } else {
                document.getElementById('user-name').innerText = user.toUpperCase();
                if (typeof listaDeJuegos !== 'undefined') render(listaDeJuegos);
            }
        };

        function cerrarSesion() {
            localStorage.removeItem('usuario');
            window.location.href = 'login.html';
        }

        function render(lista) {
            const container = document.getElementById('grid');
            container.innerHTML = '';
            lista.forEach(j => {
                container.innerHTML += `
                    <div class="card">
                        <img src="${j.imagen}" onerror="this.src='https://via.placeholder.com/250x250?text=No+Image'">
                        <p style="padding: 10px; margin: 0;">${j.titulo}</p>
                        <button class="btn-instalar" onclick="instalar('${j.url}')">INSTALAR</button>
                    </div>`;
            });
        }

        function filtrar(c) {
            const f = c === 'todos' ? listaDeJuegos : listaDeJuegos.filter(j => j.consola === c);
            render(f);
        }

        function instalar(url) {
            // El navegador iniciará la descarga automáticamente
            window.location.href = url; 
        }
        function togglePlanes() {
    const contenedor = document.getElementById('contenedor-planes');
    contenedor.classList.toggle('hidden');
    }

    </script>
</body>
</html>
