<!DOCTYPE html>
<html lang="es">
<head>
    <script src="datos.js"></script>
    <meta charset="UTF-8">
    <title>Arcade - Dashboard</title>
    <style>
        :root { --neon: #00ffcc; --bg: #0d0d0d; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; }
        header { padding: 20px; background: #1a1a1a; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; overflow: hidden; text-align: center; }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .btn-instalar { background: var(--neon); border: none; padding: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        .filtros { text-align: center; padding: 15px; }
        .btn-f { background: transparent; color: var(--neon); border: 1px solid var(--neon); padding: 8px 15px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <header>
        <h2 style="color: var(--neon)">ARCADE</h2>
        <div>USUARIO: <span id="user-name"></span></div>
    </header>

    <div class="filtros">
        <button class="btn-f" onclick="filtrar('todos')">TODOS</button>
        <button class="btn-f" onclick="filtrar('psx')">PSX</button>
        <button class="btn-f" onclick="filtrar('n64')">N64</button>
        <button class="btn-f" onclick="filtrar('gamecube')">GAMECUBE</button>
    </div>

    <div class="grid" id="grid"></div>

    <script>
        // Configuramos la URL para que funcione tanto en tu PC como en Render
        const API_URL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
            ? "http://127.0.0.1:5000"
            : "https://arcade-3qfs.onrender.com"; // Asegúrate de que esta sea tu URL de Render

        window.onload = () => {
            // CORRECCIÓN: Usamos 'usuario' que es lo que guarda tu login
            const user = localStorage.getItem('usuario'); 
            
            if (!user) {
                window.location.href = 'login.html';
            } else {
                document.getElementById('user-name').innerText = user.toUpperCase();
                // Verificamos que listaDeJuegos (de datos.js) exista
                if (typeof listaDeJuegos !== 'undefined') {
                    render(listaDeJuegos);
                }
            }
        };

        function render(lista) {
            const container = document.getElementById('grid');
            container.innerHTML = '';
            lista.forEach(j => {
                container.innerHTML += `
                    <div class="card">
                        <img src="${j.imagen}">
                        <p>${j.titulo}</p>
                        <button class="btn-instalar" onclick="instalar('${j.url}', '${j.consola}')">INSTALAR</button>
                    </div>`;
            });
        }

        function filtrar(c) {
            const f = c === 'todos' ? listaDeJuegos : listaDeJuegos.filter(j => j.consola === c);
            render(f);
        }

        function instalar(url, consola) {
            // Mandamos la petición al endpoint /auth o al que definas para instalar
            fetch(`${API_URL}/instalar`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ juego: url, consola: consola })
            })
            .then(res => res.json())
            .then(data => alert(data.message || "Instalación iniciada"))
            .catch(() => alert("Error: El servidor no responde o la ruta /instalar no existe en Python"));
        }
    </script>
</body>
</html>
