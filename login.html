<script>
    // ESTA ES LA FUNCIÓN QUE TE FALTA
    function toggleForm() {
        const nombreInput = document.getElementById('nombre');
        const title = document.getElementById('form-title');
        const btn = document.querySelector('.btn-main');
        const toggle = document.getElementById('toggle-text');

        if (nombreInput.style.display === 'none' || nombreInput.style.display === '') {
            nombreInput.style.display = 'block';
            title.innerText = 'REGISTRARSE';
            btn.innerText = 'CREAR CUENTA';
            toggle.innerText = '¿Ya tienes cuenta? Inicia sesión aquí';
        } else {
            nombreInput.style.display = 'none';
            title.innerText = 'INICIAR SESIÓN';
            btn.innerText = 'INGRESAR';
            toggle.innerText = '¿No tienes cuenta? Regístrate aquí';
        }
    }

    async function procesarAuth() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const nombreInput = document.getElementById('nombre');
        
        // Verificamos si estamos registrando o logueando
        const nombre = nombreInput.style.display === 'none' ? null : nombreInput.value;

        const datos = { nombre, email, password };
        const url = 'https://arcade-3qfs.onrender.com/auth'; 
        
        try {
            const respuesta = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });

            const resultado = await respuesta.json();
            
            if (respuesta.ok) {
                // Guardamos para que el index no nos bote
                localStorage.setItem('usuario', resultado.nombre);
                alert("¡Éxito! Bienvenido " + resultado.nombre);
                window.location.href = "index.html"; 
            } else {
                alert("Error: " + resultado.message);
            }
        } catch (error) {
            console.error("Error:", error);
            alert("El servidor está tardando en responder. Reintenta en un momento.");
        }
    }
</script>
