<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Arcade Auth</title>
    <style>
        :root { --neon: #00ffcc; --bg: #0d0d0d; }
        body {
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; color: white;
        }
        .auth-card {
            background: #1a1a1a; padding: 40px; border-radius: 15px;
            border: 2px solid var(--neon); box-shadow: 0 0 20px rgba(0,255,204,0.3);
            width: 350px; text-align: center;
        }
        input {
            width: 100%; padding: 12px; margin: 10px 0; background: #222;
            border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box;
        }
        .btn-main {
            background: var(--neon); color: black; border: none; width: 100%;
            padding: 15px; font-weight: bold; cursor: pointer; border-radius: 5px;
            text-transform: uppercase; margin-top: 10px;
        }
        .toggle-link { color: var(--neon); cursor: pointer; font-size: 0.9rem; display: block; margin-top: 15px; }
    </style>
</head>
<body>

<div class="auth-card">
    <h2 id="form-title">INICIAR SESIÓN</h2>
    <input type="text" id="nombre" placeholder="Tu Nombre (Solo para registro)" style="display: none;">
    <input type="email" id="email" placeholder="Correo Electrónico">
    <input type="password" id="password" placeholder="Contraseña">
    <button class="btn-main" onclick="procesarAuth()">INGRESAR</button>
    <span class="toggle-link" onclick="toggleForm()" id="toggle-text">¿No tienes cuenta? Regístrate aquí</span>
</div>

<script>
    let esRegistro = false;

    function toggleForm() {
        esRegistro = !esRegistro;
        document.getElementById('form-title').innerText = esRegistro ? "CREAR CUENTA" : "INICIAR SESIÓN";
        document.getElementById('nombre').style.display = esRegistro ? "block" : "none";
        document.getElementById('toggle-text').innerText = esRegistro ? "¿Ya tienes cuenta? Loguéate" : "¿No tienes cuenta? Regístrate aquí";
    }

    function procesarAuth() {
        const payload = {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            nombre: esRegistro ? document.getElementById('nombre').value : null
        };

        fetch('http://127.0.0.1:5000/auth', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(data => {
            if (data.nombre) {
                localStorage.setItem('usuarioNombre', data.nombre);
                window.location.href = 'index.html';
            } else {
                alert(data.message);
            }
        });
    }
</script>
</body>
</html>
