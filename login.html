<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Aio Arcade</title>
    <style>
        :root { --neon: #00ffcc; --bg: #0d0d0d; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #1a1a1a; padding: 40px; border-radius: 20px; border: 1px solid var(--neon); width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #333; border: 1px solid #555; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--neon); border: none; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        .hidden { display: none; }
        a { color: var(--neon); text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="color: var(--neon)">ARCADE LOGIN</h2>
        
        <div id="step1">
            <input type="email" id="email" placeholder="Gmail">
            <button onclick="solicitarCodigo()">Enviar Código al Correo</button>
        </div>

        <div id="step2" class="hidden">
            <input type="text" id="otp" placeholder="Código de 6 dígitos">
            <input type="password" id="pass" placeholder="Contraseña">
            <button onclick="iniciarSesion()">Entrar</button>
            <br><br>
            <a href="#" onclick="alert('Usa el mismo flujo de código para validar tu identidad')">¿Olvidaste tu contraseña?</a>
        </div>
    </div>

    <script>
        async function solicitarCodigo() {
            const email = document.getElementById('email').value;
            if(!email.includes('@gmail.com')) return alert("Usa un correo de Gmail");

            const res = await fetch('/enviar-otp', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email })
            });
            if(res.ok) {
                alert("Código enviado. Revisa tu bandeja de entrada.");
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
            }
        }

        async function iniciarSesion() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const codigo = document.getElementById('otp').value;

            const res = await fetch('/auth', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, password, codigo })
            });
            const data = await res.json();
            if(res.ok) {
                localStorage.setItem('usuario', data.nombre);
                window.location.href = 'index.html';
            } else {
                alert(data.message);
            }
        }
    </script>
</body>
</html>
